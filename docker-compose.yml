services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cogni-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      COGNI_ADVISOR_AI_ENABLED: "1"
      COGNI_ADVISOR_AI_BASE_URL: http://ai:7860
      COGNI_ADVISOR_AI_TIMEOUT_MS: "120000"
    depends_on:
      ai:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cogni

  ai:
    build:
      context: ./cogni-advisor-ai/GP
      dockerfile: dockerfile
    container_name: cogni-ai
    ports:
      - "${AI_PORT:-7860}:7860"
    env_file:
      - ./cogni-advisor-ai/GP/.env
    environment:
      PORT: 7860
      EELU_HOST: 0.0.0.0
      EELU_PORT: 7860
      EELU_PRELOAD: "0"
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
    restart: unless-stopped
    networks:
      - cogni

networks:
  cogni:
    driver: bridge
