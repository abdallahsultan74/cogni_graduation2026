# Optional local Postgres — use with:
#   docker compose -f docker-compose.yml -f docker-compose.local-db.yml up --build

services:
  backend:
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cogni_advisor
      DIRECT_URL: postgresql://postgres:postgres@db:5432/cogni_advisor
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: cogni-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cogni_advisor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - cogni

volumes:
  postgres_data:
